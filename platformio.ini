; tembed-oink — minimal WiFi handshake capture + wpa-sec upload firmware
; Target: LilyGo T-Embed CC1101 (ESP32-S3, rotary encoder + side button,
;         ST7789 320x170). The CC1101 sub-GHz radio is NOT used.

[env:t-embed-cc1101]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
custom_version = 0.1.0-oink
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
; T-Embed CC1101 is an ESP32-S3R8: QUAD flash + OCTAL PSRAM (N16R8). The default
; qio_qspi bootloader misconfigures the octal PSRAM and reset-loops at boot.
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_build.sdkconfig = sdkconfig.defaults
monitor_speed = 115200
upload_speed = 460800

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    -DPORKCHOP_LOG_ENABLED=0
    -include src/core/logging.h
    ; Board selector + compat-shim include path (<M5Unified.h>/<M5Cardputer.h>)
    -DPORK_BOARD_TEMBED_CC1101
    -I src/hal/tembed_shims
    ; NimBLE: internal alloc (PSRAM disabled), low log verbosity
    -DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=0
    -DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_INTERNAL=1
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=1
    ; Deauth raw-frame override: bypass ieee80211_raw_frame_sanity_check so deauth
    ; frames transmit. (The WiFi failure once blamed on this was actually the
    ; display SPI init grabbing WiFi's GDMA resource — fixed by connecting WiFi
    ; before the display, so this override is safe to keep on.)
    -DOINK_DEAUTH_OVERRIDE
    -Wl,-zmuldefs
    -Os



lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    mathertel/RotaryEncoder@^1.5.3
    bblanchon/ArduinoJson@^7.4.2
    h2zero/NimBLE-Arduino@^2.3.7
